<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ประวัติส่วนตัว - น้องสตางค์</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        /* กำหนดตัวแปรสีเพื่อความง่ายในการปรับแก้ */
        :root {
            --primary-color: #ff7eb3;
            --secondary-color: #ff758c;
            --text-color: #4a4a4a;
            --bg-color: #ffe6f0;
        }

        body {
            font-family: 'Prompt', sans-serif;
            background: linear-gradient(135deg, var(--bg-color) 0%, #ffc3d9 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            color: var(--text-color);
        }

        .profile-card {
            background: #ffffff;
            border-radius: 24px;
            box-shadow: 0 15px 35px rgba(255, 117, 140, 0.2);
            padding: 40px 30px;
            width: 100%;
            max-width: 350px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        /* ตกแต่งแถบสีด้านบนของการ์ด */
        .profile-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 130px;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            z-index: 0;
            border-bottom-left-radius: 20px;
            border-bottom-right-radius: 20px;
        }
